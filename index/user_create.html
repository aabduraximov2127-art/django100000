{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Create User 🚀</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <small class="error">{{ field.errors }}</small>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn">Create</button>
        </form>
    </div>
</div>
{% endblock %}
