{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Create User 🚀</h2>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Ism</label>
                <input type="text" name="ism" required>
            </div>

            <div class="form-group">
                <label>Familya</label>
                <input type="text" name="familya" required>
            </div>

            <div class="form-group">
                <label>Yosh</label>
                <input type="number" name="yosh" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Telefon</label>
                <input type="text" name="phon" placeholder="+998901234567" required>
            </div>

            <div class="form-group">
                <label>Rasm</label>
                <input type="file" name="picture">
            </div>

            <button type="submit" class="btn">Create</button>
        </form>
    </div>
</div>
{% endblock %}
